site_name: 人形机器人：从矿山到市场
site_description: 基于 Awesome Humanoid Robot 知识图谱的 Wiki
site_author: yansong
site_url: https://kg.rounds-tech.com/wiki/

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yansong
  alternate:
    - name: 简体中文
      link: ./
      lang: zh

plugins:
  - search
  - minify:
      minify_html: true
  - mermaid2:
      version: 10.6.1
      arguments:
        theme: default

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - tables
  - toc:
      permalink: true
      toc_depth: 4

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 全书目录: table-of-contents.md
  - 0→1 造机路线图:
    - 路线图总览: roadmap/index.md
    - 阶段 0 · 基础筑基: roadmap/stage-0-foundations.md
    - 阶段 1 · 造一个关节: roadmap/stage-1-actuator.md
    - 阶段 2 · 双足平台: roadmap/stage-2-biped.md
    - 阶段 3 · 完整人形: roadmap/stage-3-humanoid.md
    - 选型手册:
      - 执行器选型: roadmap/playbooks/actuator-selection.md
      - 传感器选型: roadmap/playbooks/sensor-selection.md
      - 计算平台选型: roadmap/playbooks/compute-selection.md
      - 仿真环境搭建: roadmap/playbooks/sim-setup.md
  - 第一部分：总论与方法论:
    - 第 1 章 绪论：为什么是人形机器人？: chapters/chapter-01.md
    - 第 2 章 知识图谱构建方法论: chapters/chapter-02.md
  - 第二部分：物理基础层:
    - 第 3 章 关键材料: chapters/chapter-03.md
    - 第 4 章 执行器：人形机器人的"肌肉": chapters/chapter-04.md
    - 第 5 章 传感与感知硬件: chapters/chapter-05.md
    - 第 6 章 计算、电源与热管理: chapters/chapter-06.md
    - 第 7 章 供应商地图与供应链治理: chapters/chapter-07.md
  - 第三部分：设计工程层:
    - 第 8 章 人形机器人设计原理: chapters/chapter-08.md
    - 第 9 章 关键子系统设计: chapters/chapter-09.md
  - 第四部分：制造与量产层:
    - 第 10 章 制造工艺体系: chapters/chapter-10.md
    - 第 11 章 装配、集成与测试: chapters/chapter-11.md
    - 第 12 章 认证、合规与质量标准: chapters/chapter-12.md
    - 第 13 章 量产与规模化: chapters/chapter-13.md
  - 第五部分：控制与运动层:
    - 第 14 章 机器人控制基础: chapters/chapter-14.md
    - 第 15 章 运动生成与 Locomotion: chapters/chapter-15.md
    - 第 16 章 操作与抓取: chapters/chapter-16.md
    - 第 17 章 遥操作与人机协作: chapters/chapter-17.md
  - 第六部分：AI、模型与数据层:
    - 第 18 章 模仿学习与策略学习: chapters/chapter-18.md
    - 第 19 章 视觉-语言-动作模型（VLA）: chapters/chapter-19.md
    - 第 20 章 世界模型与长期推理: chapters/chapter-20.md
    - 第 21 章 数据基础设施: chapters/chapter-21.md
  - 第七部分：软件与仿真层:
    - 第 22 章 软件中间件: chapters/chapter-22.md
    - 第 23 章 仿真与物理引擎: chapters/chapter-23.md
    - 第 24 章 端到端软件栈: chapters/chapter-24.md
  - 第八部分：评测、基准与验证:
    - 第 25 章 机器人评测体系: chapters/chapter-25.md
  - 第九部分：整机、企业与市场:
    - 第 26 章 整机系统案例: chapters/chapter-26.md
    - 第 27 章 应用场景: chapters/chapter-27.md
    - 第 28 章 市场、企业与投资: chapters/chapter-28.md
  - 第十部分：政策、伦理与未来:
    - 第 29 章 政策、监管与伦理: chapters/chapter-29.md
    - 第 30 章 未来展望: chapters/chapter-30.md
  - 附录:
    - 附录 A 实体与关系速查表: appendices/appendix-a.md
    - 附录 B 关键数据集清单: appendices/appendix-b.md
    - 附录 C 软件与仿真平台清单: appendices/appendix-c.md
    - 附录 D 主要供应商与企业名录: appendices/appendix-d.md
    - 附录 E 标准、法规与认证清单: appendices/appendix-e.md
    - 附录 F 知识图谱查询示例: appendices/appendix-f.md
    - 附录 G 术语表: appendices/appendix-g.md

hooks:
  - .hooks/exclude_aux_files.py

copyright: Copyright &copy; 2026 yansong. 基于 Awesome Humanoid Robot 知识图谱构建。

extra_css:
  - assets/stylesheets/extra.css
