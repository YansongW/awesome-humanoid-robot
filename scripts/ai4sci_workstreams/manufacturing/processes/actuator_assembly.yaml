name: actuator_assembly
description: |
  Survey assembly processes for humanoid robot actuators and joints, covering
  precision alignment, reducer-motor integration, bearing and encoder mounting,
  fastening, lubrication, contamination control, and in-process calibration
  steps that determine actuator performance and yield.
