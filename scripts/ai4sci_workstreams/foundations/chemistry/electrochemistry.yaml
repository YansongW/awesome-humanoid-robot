name: electrochemistry
description: |
  Survey electrochemical kinetics and transport phenomena that underpin humanoid robot
  battery systems: Butler-Volmer equation, Nernst equation, Fick's laws, Nernst-Planck
  equation, solid-electrolyte interphase, equivalent circuit models, and battery state estimation.
seed_queries:
  - "Butler Volmer equation lithium ion battery kinetics"
  - "Nernst Planck equation electrolyte transport battery"
  - "solid electrolyte interphase lithium ion battery model"
  - "electrochemical impedance spectroscopy humanoid robot battery"
  - "battery state estimation Kalman filter electrochemistry"
