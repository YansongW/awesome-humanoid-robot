name: tactile_sensors
description: |
  Survey tactile and force sensing technologies for humanoid robot hands and
  skin: pressure-sensitive arrays, strain gauges, optical tactile sensors,
  sensorized gloves, and their use in grasp control, slip detection, and
  safe human contact.
seed_queries:
