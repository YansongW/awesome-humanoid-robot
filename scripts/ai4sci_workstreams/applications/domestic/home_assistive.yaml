name: home_assistive
description: |
  Survey humanoid robot applications for home and assistive environments,
  including elderly care, household chores, mobility assistance, social
  interaction, and safety requirements for cohabitation with humans. Focus on
  task diversity, manipulation in cluttered spaces, and human-robot interaction.
seed_queries:
  - "humanoid robot home assistance elderly care"
  - "domestic humanoid robot household tasks manipulation"
  - "assistive humanoid robot mobility support"
  - "human robot interaction home environment safety"
  - "humanoid robot activities of daily living ADL"
