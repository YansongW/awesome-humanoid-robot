name: warehouse_logistics
description: |
  Survey humanoid robot applications in warehouse and logistics operations,
  including picking, packing, palletizing, forklift-style transport, shelf
  restocking, and last-meter material handling. Focus on operational
  requirements, performance metrics, and integration with warehouse management
  systems.
