name: Deploy Knowledge Graph Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Prevent concurrent deployments from racing to push to gh-pages.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r website/requirements.txt

      - name: Audit knowledge graph quality
        run: |
          python scripts/audit_entry_quality.py --json-only
          python - <<'PY'
          import json, sys
          from pathlib import Path
          report = sorted(Path('.staging/quality_reports').glob('quality_report_*.json'))[-1]
          r = json.loads(report.read_text())
          rel = r['relationships']
          failed = False
          print(f"Entries: {r['total_entries']}, critical: {r['severity_counts'].get('critical', 0)}, warning: {r['severity_counts'].get('warning', 0)}")
          print(f"Relationships: {rel['total']}, dangling: {len(rel['dangling'])}, missing_type: {len(rel['missing_type'])}, duplicates: {len(rel['duplicates'])}")
          print(f"Parse errors: {len(r['parse_errors'])}")
          conn = rel.get('connectivity', {})
          print(f"Connectivity: zero-degree {conn.get('zero_degree_count')} ({conn.get('zero_degree_ratio', 0):.2%}), avg_degree {conn.get('avg_degree')}")
          if rel['dangling'] or rel['missing_type'] or rel['duplicates'] or r['parse_errors']:
              print("Quality gate failed: relationship or parse errors detected.")
              failed = True
          # Connectivity regression gate: zero-degree share must stay below 5%.
          if conn.get('zero_degree_ratio', 0) > 0.05:
              print("Quality gate failed: zero-degree ratio above 5%.")
              failed = True
          # Future gate: fail on any critical entry once the backlog is cleared.
          # if r['severity_counts'].get('critical', 0) > 0:
          #     print("Quality gate failed: critical entry content gaps remain.")
          #     failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Regenerate and validate roadmap bindings
        run: |
          python scripts/build_roadmap_mapping.py
          git diff --exit-code --stat data/roadmap_mapping.yaml || echo "note: mapping regenerated (content drift)"

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: .staging/quality_reports/

      - name: Build static site
        run: python -m website.builder.build

      - name: Add CNAME
        run: echo "kg.rounds-tech.com" > website/dist/CNAME

      - name: Verify build output
        run: |
          test -d website/dist || (echo "Build output missing!" && exit 1)
          test -s website/dist/index.html || (echo "index.html missing or empty!" && exit 1)
          echo "Deploying $(find website/dist -type f | wc -l) files"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy to GitHub Pages from ${{ github.sha }}"
