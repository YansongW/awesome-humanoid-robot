name: Deploy Knowledge Graph Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Prevent concurrent deployments from racing to push to gh-pages.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r website/requirements.txt

      - name: Build static site
        run: python -m website.builder.build

      - name: Add CNAME
        run: echo "kg.rounds-tech.com" > website/dist/CNAME

      - name: Verify build output
        run: |
          test -d website/dist || (echo "Build output missing!" && exit 1)
          test -s website/dist/index.html || (echo "index.html missing or empty!" && exit 1)
          echo "Deploying $(find website/dist -type f | wc -l) files"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy to GitHub Pages from ${{ github.sha }}"
