<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}人形机器人知识图谱{% endblock %}</title>
  <meta name="description" content="基于 Awesome Humanoid Robot 的全尺寸双足人形机器人知识图谱：从材料、零部件、制造到 AI、软件、市场与政策的系统性产业地图。">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="/">
        <span class="logo-icon">🤖</span>
        <span class="logo-text">Rounds Tech<span class="logo-sub">KG</span></span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="/">首页</a>
        <a href="/graph/">关系图谱</a>
        <a href="/search/">搜索</a>
      </nav>
      <div class="header-actions">
        <form class="search-form" action="/search/" method="get" role="search">
          <input type="search" name="q" placeholder="搜索实体、论文、公司…" aria-label="搜索">
          <button type="submit" aria-label="搜索">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
          </button>
        </form>
        <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">
          <span class="theme-icon-light">☀️</span>
          <span class="theme-icon-dark">🌙</span>
        </button>
        <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="菜单">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <strong>Rounds Tech KG</strong>
        <p>从矿山到市场的人形机器人知识图谱</p>
      </div>
      <div class="footer-links">
        <a href="/">首页</a>
        <a href="/graph/">关系图谱</a>
        <a href="/search/">搜索</a>
        <a href="https://github.com/YansongW/awesome-humanoid-robot" target="_blank" rel="noopener">GitHub</a>
      </div>
      <div class="footer-copy">
        &copy; 2026 Rounds Tech. Built on <a href="https://github.com/YansongW/awesome-humanoid-robot" target="_blank" rel="noopener">Awesome Humanoid Robot</a>.
      </div>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
