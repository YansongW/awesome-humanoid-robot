{% extends "base.html" %}

{% block title %}{{ ui.not_found }} · {{ ui.site_title }}{% endblock %}

{% block content %}
{% set bp = '' if lang == 'zh' else '/' + lang %}
<div class="container">
  <div class="not-found">
    <div class="not-found-icon">🔭</div>
    <h1>404</h1>
    <p>{{ ui.not_found }}</p>
    <div class="not-found-actions">
      <a href="{{ bp }}/" class="btn btn-primary">{{ ui.nav_home }}</a>
      <a href="{{ bp }}/search/" class="btn btn-secondary">{{ ui.nav_search }}</a>
    </div>
  </div>
</div>
{% endblock %}
