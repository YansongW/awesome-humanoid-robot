{% extends "base.html" %}

{% block title %}搜索 · 人形机器人知识图谱{% endblock %}

{% block content %}
<div class="container">
  <section class="search-hero">
    <h1>搜索知识图谱</h1>
    <form id="search-form" class="big-search" action="/search/" method="get">
      <input type="search" name="q" id="search-input" placeholder="输入关键词，例如：减速器、特斯拉、VLA…" autocomplete="off">
      <button type="submit">搜索</button>
    </form>
    <div class="search-filters" id="search-filters">
      <span class="filter-label">按类型筛选：</span>
      <div class="filter-tags" id="type-filters">
        <button class="filter-tag active" data-type="all">全部</button>
        {% for t in types %}
        <button class="filter-tag" data-type="{{ t }}">{{ t }}</button>
        {% endfor %}
      </div>
    </div>
  </section>

  <section class="search-results-section">
    <div class="results-header">
      <h2 id="results-title">全部实体</h2>
      <span id="results-count" class="results-count"></span>
    </div>
    <div id="results-list" class="results-list">
      <div class="loading-state">正在加载搜索索引…</div>
    </div>
    <div id="load-more" class="load-more hidden">
      <button>加载更多</button>
    </div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script src="/js/search.js"></script>
{% endblock %}
