<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>搜索知识图谱 · 人形机器人知识图谱</title>
  <meta name="description" content="从矿山到市场的人形机器人知识图谱">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  
</head>
<body data-lang="zh">
  <a class="skip-link" href="#main-content">跳转到主内容</a>
  
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="/">
        <span class="logo-icon">🤖</span>
        <span class="logo-text">Rounds Tech<span class="logo-sub">KG</span></span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="/" >首页</a>
        <a href="/roadmap/" >路线图</a>
        <a href="/graph/" >关系图谱</a>
        <a href="/search/" aria-current="page">搜索</a>
        <a href="/wiki/" >Wiki</a>
        <a href="/about/" >关于</a>
      </nav>
      <div class="header-actions">
        <form class="search-form" action="/search/" method="get" role="search">
          <input type="search" name="q" placeholder="搜索实体、论文、公司…" aria-label="搜索">
          <button type="submit" aria-label="搜索">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
          </button>
        </form>
        <div class="language-switcher">
          <select id="language-switcher" aria-label="Language">
            
            <option value="zh" selected>简体中文</option>
            
            <option value="en" >English</option>
            
            <option value="ko" >한국어</option>
            
          </select>
        </div>
        <button class="theme-toggle" id="theme-toggle" aria-label="切换主题" title="切换主题">
          <span class="theme-icon-light">☀️</span>
          <span class="theme-icon-dark">🌙</span>
        </button>
        <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="菜单" title="菜单">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main id="main-content" class="main-content">
    

<div class="container">
  <section class="search-hero">
    <h1>搜索知识图谱</h1>
    <form id="search-form" class="big-search" action="/search/" method="get">
      <input type="search" name="q" id="search-input" placeholder="输入关键词，例如：减速器、特斯拉、VLA…" autocomplete="off">
      <button type="submit">搜索</button>
    </form>
    <div class="search-filters" id="search-filters">
      <span class="filter-label">按类型筛选：</span>
      <div class="filter-tags" id="type-filters">
        <button class="filter-tag active" data-type="all">全部</button>
        
        <button class="filter-tag" data-type="algorithm">算法</button>
        
        <button class="filter-tag" data-type="application_scenario">应用场景</button>
        
        <button class="filter-tag" data-type="benchmark">评测基准</button>
        
        <button class="filter-tag" data-type="company">公司</button>
        
        <button class="filter-tag" data-type="component">零部件</button>
        
        <button class="filter-tag" data-type="component_manufacturer">零部件制造商</button>
        
        <button class="filter-tag" data-type="concept">概念</button>
        
        <button class="filter-tag" data-type="dataset">数据集</button>
        
        <button class="filter-tag" data-type="equation">方程</button>
        
        <button class="filter-tag" data-type="formalism">形式化方法</button>
        
        <button class="filter-tag" data-type="foundation">基础学科</button>
        
        <button class="filter-tag" data-type="market_segment">市场细分</button>
        
        <button class="filter-tag" data-type="material">材料</button>
        
        <button class="filter-tag" data-type="method">方法</button>
        
        <button class="filter-tag" data-type="oem">整机厂商</button>
        
        <button class="filter-tag" data-type="operator">算子</button>
        
        <button class="filter-tag" data-type="paper">论文</button>
        
        <button class="filter-tag" data-type="principle">原理</button>
        
        <button class="filter-tag" data-type="report">报告</button>
        
        <button class="filter-tag" data-type="robot_system">机器人系统</button>
        
        <button class="filter-tag" data-type="software_platform">软件平台</button>
        
        <button class="filter-tag" data-type="standard">标准</button>
        
        <button class="filter-tag" data-type="technology">技术</button>
        
        <button class="filter-tag" data-type="theorem">定理</button>
        
        <button class="filter-tag" data-type="tier1_supplier">Tier 1 供应商</button>
        
        <button class="filter-tag" data-type="tool_equipment">工具设备</button>
        
      </div>
      <div class="filter-domain">
        <label for="domain-filter" class="filter-label">按领域过滤</label>
        <select id="domain-filter">
          <option value="">全部</option>
          
          <option value="00_foundations">基础学科</option>
          
          <option value="01_raw_materials">原材料</option>
          
          <option value="02_components">零部件</option>
          
          <option value="03_manufacturing_processes">制造工艺</option>
          
          <option value="04_assembly_integration_testing">组装集成测试</option>
          
          <option value="05_mass_production">量产制造</option>
          
          <option value="06_design_engineering">设计工程</option>
          
          <option value="07_ai_models_algorithms">AI 模型与算法</option>
          
          <option value="08_software_middleware">软件中间件</option>
          
          <option value="09_data_datasets">数据与数据集</option>
          
          <option value="10_evaluation_benchmarks">评测基准</option>
          
          <option value="11_applications_markets">应用与市场</option>
          
          <option value="12_policy_regulation_ethics">政策法规伦理</option>
          
        </select>
      </div>
    </div>
  </section>

  <section class="search-results-section" data-base-path="" data-no-results="未找到与 “{query}” 相关的实体。" data-results-count="共 {count} 条结果" data-empty-message="输入关键词或选择类型以开始搜索。" data-loading="正在加载搜索索引…">
    <div class="results-header">
      <h2 id="results-title">全部实体</h2>
      <span id="results-count" class="results-count"></span>
    </div>
    <div id="results-list" class="results-list">
      <div class="loading-state">正在加载搜索索引…</div>
    </div>
    <div id="load-more" class="load-more hidden">
      <button>加载更多</button>
    </div>
  </section>
</div>

  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <strong>Rounds Tech KG</strong>
        <p>从矿山到市场的人形机器人知识图谱</p>
      </div>
      <div class="footer-links">
        <a href="/">首页</a>
        <a href="/roadmap/">路线图</a>
        <a href="/graph/">关系图谱</a>
        <a href="/search/">搜索</a>
        <a href="/wiki/">Wiki</a>
        <a href="/about/">关于</a>
        <a href="https://github.com/YansongW/awesome-humanoid-robot" target="_blank" rel="noopener">GitHub</a>
      </div>
      <div class="footer-copy">
        &copy; 2026 Rounds Tech. Built on <a href="https://github.com/YansongW/awesome-humanoid-robot" target="_blank" rel="noopener">Awesome Humanoid Robot</a>.
      </div>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  
<script src="/js/search.js"></script>

</body>
</html>
